    <style>
        :root {
          --cad-bg: #000000;
          --accent: #00bcd4;
          --border: rgba(255, 255, 255, 0.08);
        }
        * {
          -webkit-tap-highlight-color: transparent;
          -webkit-touch-callout: none;
        }
        body { 
          margin: 0; padding: 0; 
          background-color: var(--cad-bg); 
          overflow: hidden; 
          overscroll-behavior: none; 
          touch-action: manipulation;
          -webkit-user-select: none;
          user-select: none;
          font-family: 'Inter', sans-serif;
          -webkit-font-smoothing: antialiased;
          height: 100dvh;
        }
        #root { 
          width: 100vw; 
          height: 100dvh; 
          display: flex;
          flex-direction: column;
        }
        ::-webkit-scrollbar { display: none; }
        
        .glass-panel {
          background: rgba(10, 10, 12, 0.96);
          backdrop-filter: blur(16px);
          border: 1px solid var(--border);
        }
        
        .no-tap {
          -webkit-tap-highlight-color: transparent;
        }

        canvas {
          outline: none;
          touch-action: none;
        }
        
        .loader-spinner {
          width: 24px;
          height: 24px;
          border: 3px solid rgba(0, 188, 212, 0.2);
          border-top: 3px solid #00bcd4;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        input, textarea {
          -webkit-user-select: text;
          user-select: text;
        }

        /* Landscape adjustments */
        @media (max-height: 450px) and (orientation: landscape) {
          .toolbar-height { height: 60px; }
          .header-height { height: 44px; }
        }

    <script>
        window.addEventListener('error', function(e) {
            console.error('GLOBAL_ERR:', e.message, 'at', e.filename, ':', e.lineno);

            if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
                console.error('ASSET_LOAD_FAILED:', e.target.src || e.target.href);
            }
        }, true);
